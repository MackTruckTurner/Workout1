<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymTrack">
<title>GymTrack</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --surface2: #22263a;
    --accent: #e8ff47;
    --accent2: #47c2ff;
    --text: #f0f0f0;
    --muted: #7a7f96;
    --border: rgba(255,255,255,0.08);
    --danger: #ff5757;
    --success: #47ff8a;
    --warn: #ffb347;
    --radius: 16px;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; overflow: hidden; }
  
  /* ── APP SHELL ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header { padding: 16px 20px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #header h1 { font-family: var(--font-display); font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
  #header .date { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
  
  /* ── BOTTOM NAV ── */
  #nav { display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 14px; border: none; background: none; color: var(--muted); font-family: var(--font-body); font-size: 10px; letter-spacing: 0.5px; cursor: pointer; transition: color 0.15s; }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.active { color: var(--accent); }
  
  /* ── PAGES ── */
  #pages { flex: 1; overflow-y: auto; overflow-x: hidden; overscroll-behavior: none; }
  .page { display: none; padding: 16px 16px 80px; min-height: 100%; }
  .page.active { display: block; }

  /* ── PROFILE PAGE ── */
  .profile-card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
  .profile-card h2 { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 1px; color: var(--accent); margin-bottom: 16px; text-transform: uppercase; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--surface2); border-radius: 12px; padding: 14px; text-align: center; }
  .stat-box .val { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .bmi-box { background: var(--surface2); border-radius: 12px; padding: 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .bmi-box .left .val { font-family: var(--font-display); font-size: 40px; font-weight: 800; line-height: 1; }
  .bmi-box .left .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .bmi-badge { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; }
  .bmi-under { background: rgba(71,194,255,0.15); color: var(--accent2); }
  .bmi-normal { background: rgba(71,255,138,0.15); color: var(--success); }
  .bmi-over { background: rgba(255,179,71,0.15); color: var(--warn); }
  .bmi-obese { background: rgba(255,87,87,0.15); color: var(--danger); }
  
  /* ── FORM ELEMENTS ── */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: #1a1d26; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  /* ── BUTTONS ── */
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: transform 0.1s, opacity 0.1s; }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(255,87,87,0.15); color: var(--danger); border: 1px solid rgba(255,87,87,0.3); }
  .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; border-radius: 8px; }

  /* ── WORKOUT PAGE ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text); }
  .tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 500; background: rgba(232,255,71,0.12); color: var(--accent); }
  
  .exercise-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .ex-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
  .ex-name { font-size: 15px; font-weight: 500; }
  .ex-muscle { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ex-actions { display: flex; gap: 8px; }
  .icon-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--surface2); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.15s; }
  .icon-btn:hover, .icon-btn:active { color: var(--text); }
  .icon-btn.del:active { color: var(--danger); }
  
  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 16px 8px; text-align: center; }
  .sets-table th:first-child { text-align: left; }
  .sets-table td { padding: 4px 8px; text-align: center; border-top: 1px solid var(--border); }
  .sets-table td:first-child { padding-left: 16px; text-align: left; font-size: 13px; color: var(--muted); }
  .set-input { width: 60px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 4px; color: var(--text); font-family: var(--font-body); font-size: 14px; text-align: center; outline: none; }
  .set-input:focus { border-color: var(--accent); }
  .sets-footer { padding: 10px 16px 14px; display: flex; gap: 8px; }
  .add-set-btn { flex: 1; padding: 9px; background: var(--surface2); border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font-body); font-size: 13px; cursor: pointer; }
  .add-set-btn:active { color: var(--accent); border-color: var(--accent); }
  .done-set-btn { padding: 9px 14px; background: rgba(71,255,138,0.1); border: 1px solid rgba(71,255,138,0.2); border-radius: 8px; color: var(--success); font-size: 13px; font-family: var(--font-body); cursor: pointer; }
  .done-set-btn:active { opacity: 0.7; }
  .set-row.completed td { opacity: 0.5; }
  .set-row.completed td:first-child::after { content: " ✓"; color: var(--success); opacity: 1; }
  
  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; padding: 20px 20px 40px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-bottom: 16px; text-transform: uppercase; }
  .modal-close { float: right; background: var(--surface2); border: none; color: var(--muted); border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; line-height: 32px; text-align: center; }
  .hidden { display: none !important; }
  
  /* ── HISTORY PAGE ── */
  .history-day { margin-bottom: 20px; }
  .history-day-header { font-family: var(--font-display); font-size: 14px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .history-item { background: var(--surface); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .history-item .name { font-size: 15px; font-weight: 500; }
  .history-item .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .history-item .vol { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--accent); }
  .history-item .vol-lbl { font-size: 10px; color: var(--muted); text-align: right; }
  
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state svg { opacity: 0.3; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  
  /* ── TIMER ── */
  #timer-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #timer-bar.hidden { display: none; }
  .timer-label { font-size: 12px; color: var(--muted); }
  .timer-val { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .timer-actions { display: flex; gap: 8px; }
  .timer-btn { background: var(--surface2); border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: var(--text); cursor: pointer; font-family: var(--font-body); }
  
  /* ── SCROLLBAR ── */
  #pages::-webkit-scrollbar { width: 0; }
  
  /* ── TOAST ── */
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface2); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 13px; border: 1px solid var(--border); opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 200; white-space: nowrap; }
  #toast.show { opacity: 1; }
  
  /* ── EXERCISES QUICK PICK ── */
  .muscle-group-btn { display: inline-block; padding: 7px 14px; margin: 0 6px 6px 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--muted); cursor: pointer; }
  .muscle-group-btn.sel { background: rgba(232,255,71,0.12); color: var(--accent); border-color: rgba(232,255,71,0.3); }
  .ex-pick-list { max-height: 240px; overflow-y: auto; margin: 12px 0; }
  .ex-pick-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .ex-pick-item:active { background: var(--surface2); }
  .ex-pick-item .ep-name { font-size: 14px; }
  .ex-pick-item .ep-muscle { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── WORKOUT HEADER ── */
  .workout-meta { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .workout-meta .wm-name { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .workout-meta .wm-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  
  /* ── WEIGHT HISTORY ── */
  .weight-entry { background: var(--surface); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .weight-entry .we-date { font-size: 12px; color: var(--muted); }
  .weight-entry .we-val { font-family: var(--font-display); font-size: 24px; font-weight: 700; }
  .weight-entry .we-delta { font-size: 12px; }
  .delta-down { color: var(--success); }
  .delta-up { color: var(--danger); }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <h1>GYMTRACK</h1>
    <div class="date" id="header-date"></div>
  </div>
  
  <!-- TIMER BAR -->
  <div id="timer-bar" class="hidden">
    <div>
      <div class="timer-label">Rest Timer</div>
      <div class="timer-val" id="timer-display">0:00</div>
    </div>
    <div class="timer-actions">
      <button class="timer-btn" onclick="resetTimer()">Reset</button>
      <button class="timer-btn" onclick="stopTimer()">Dismiss</button>
    </div>
  </div>

  <!-- PAGES -->
  <div id="pages">
    <!-- WORKOUT -->
    <div class="page active" id="page-workout">
      <div class="section-header">
        <span class="section-title">Today's Workout</span>
        <button class="btn btn-primary btn-sm" onclick="openNewWorkout()">+ New</button>
      </div>
      <div id="workout-content"></div>
    </div>
    
    <!-- HISTORY -->
    <div class="page" id="page-history">
      <div class="section-header">
        <span class="section-title">History</span>
      </div>
      <div id="history-content"></div>
    </div>
    
    <!-- PROFILE -->
    <div class="page" id="page-profile">
      <div class="profile-card">
        <h2>My Stats</h2>
        <div class="stat-row">
          <div class="stat-box">
            <div class="val" id="disp-height">--</div>
            <div class="lbl">Height (cm)</div>
          </div>
          <div class="stat-box">
            <div class="val" id="disp-weight">--</div>
            <div class="lbl">Weight (kg)</div>
          </div>
        </div>
        <div class="bmi-box" id="bmi-box">
          <div class="left">
            <div class="val" id="disp-bmi">--</div>
            <div class="lbl">BMI</div>
          </div>
          <div class="bmi-badge" id="bmi-badge">—</div>
        </div>
        <div class="stat-row">
          <div class="stat-box">
            <div class="val" id="disp-workouts">0</div>
            <div class="lbl">Workouts</div>
          </div>
          <div class="stat-box">
            <div class="val" id="disp-exercises">0</div>
            <div class="lbl">Sets Done</div>
          </div>
        </div>
      </div>
      
      <div class="profile-card">
        <h2>Update Stats</h2>
        <div class="row2">
          <div class="field"><label>Height (cm)</label><input type="number" id="inp-height" placeholder="175"></div>
          <div class="field"><label>Weight (kg)</label><input type="number" id="inp-weight" placeholder="75" step="0.1"></div>
        </div>
        <div class="field">
          <label>Age</label>
          <input type="number" id="inp-age" placeholder="25">
        </div>
        <div class="row2">
          <div class="field"><label>Gender</label>
            <select id="inp-gender">
              <option value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="field"><label>Goal</label>
            <select id="inp-goal">
              <option value="build">Build Muscle</option>
              <option value="lose">Lose Weight</option>
              <option value="maintain">Maintain</option>
              <option value="strength">Gain Strength</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
      </div>
      
      <!-- Weight History -->
      <div class="profile-card">
        <h2>Weight Log</h2>
        <div class="row2" style="margin-bottom:12px">
          <div class="field"><label>New Weight (kg)</label><input type="number" id="inp-weight-log" placeholder="75.5" step="0.1"></div>
          <div style="display:flex;align-items:flex-end;padding-bottom:0">
            <button class="btn btn-secondary btn-sm" style="width:100%" onclick="logWeight()">Log It</button>
          </div>
        </div>
        <div id="weight-history"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="nav">
    <button class="nav-btn active" onclick="showPage('workout',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>
      Workout
    </button>
    <button class="nav-btn" onclick="showPage('history',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      History
    </button>
    <button class="nav-btn" onclick="showPage('profile',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Profile
    </button>
  </nav>
</div>

<!-- MODAL: New Workout -->
<div class="modal-overlay hidden" id="modal-new-workout">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-new-workout')">×</button>
    <h3>Start Workout</h3>
    <div class="field"><label>Workout Name</label><input type="text" id="wk-name" placeholder="e.g. Push Day, Leg Day..."></div>
    <div class="field">
      <label>Template</label>
      <select id="wk-template" onchange="applyTemplate()">
        <option value="">Custom (empty)</option>
        <option value="push">Push Day (Chest/Shoulders/Tris)</option>
        <option value="pull">Pull Day (Back/Biceps)</option>
        <option value="legs">Leg Day</option>
        <option value="upper">Upper Body</option>
        <option value="full">Full Body</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startWorkout()" style="margin-top:8px">Start Workout</button>
  </div>
</div>

<!-- MODAL: Add Exercise -->
<div class="modal-overlay hidden" id="modal-add-exercise">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-add-exercise')">×</button>
    <h3>Add Exercise</h3>
    <div style="margin-bottom:12px">
      <div id="muscle-filters"></div>
    </div>
    <div class="ex-pick-list" id="ex-pick-list"></div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div class="field"><label>Or type custom name</label><input type="text" id="custom-ex-name" placeholder="Custom exercise..."></div>
      <div class="field"><label>Muscle Group</label>
        <select id="custom-ex-muscle">
          <option value="Chest">Chest</option><option value="Back">Back</option>
          <option value="Shoulders">Shoulders</option><option value="Biceps">Biceps</option>
          <option value="Triceps">Triceps</option><option value="Legs">Legs</option>
          <option value="Glutes">Glutes</option><option value="Core">Core</option>
          <option value="Cardio">Cardio</option><option value="Other">Other</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="addCustomExercise()">Add Custom</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────
const EXERCISES = [
  {name:"Bench Press",muscle:"Chest"},{name:"Incline Bench Press",muscle:"Chest"},
  {name:"Decline Bench Press",muscle:"Chest"},{name:"Chest Fly",muscle:"Chest"},
  {name:"Push Up",muscle:"Chest"},{name:"Cable Fly",muscle:"Chest"},
  {name:"Overhead Press",muscle:"Shoulders"},{name:"Lateral Raise",muscle:"Shoulders"},
  {name:"Front Raise",muscle:"Shoulders"},{name:"Arnold Press",muscle:"Shoulders"},
  {name:"Face Pull",muscle:"Shoulders"},{name:"Rear Delt Fly",muscle:"Shoulders"},
  {name:"Tricep Pushdown",muscle:"Triceps"},{name:"Overhead Tricep Extension",muscle:"Triceps"},
  {name:"Skull Crusher",muscle:"Triceps"},{name:"Dips",muscle:"Triceps"},
  {name:"Deadlift",muscle:"Back"},{name:"Barbell Row",muscle:"Back"},
  {name:"Pull Up",muscle:"Back"},{name:"Lat Pulldown",muscle:"Back"},
  {name:"Seated Cable Row",muscle:"Back"},{name:"T-Bar Row",muscle:"Back"},
  {name:"Barbell Curl",muscle:"Biceps"},{name:"Dumbbell Curl",muscle:"Biceps"},
  {name:"Hammer Curl",muscle:"Biceps"},{name:"Preacher Curl",muscle:"Biceps"},
  {name:"Squat",muscle:"Legs"},{name:"Leg Press",muscle:"Legs"},
  {name:"Romanian Deadlift",muscle:"Legs"},{name:"Leg Extension",muscle:"Legs"},
  {name:"Leg Curl",muscle:"Legs"},{name:"Calf Raise",muscle:"Legs"},
  {name:"Hip Thrust",muscle:"Glutes"},{name:"Glute Bridge",muscle:"Glutes"},
  {name:"Bulgarian Split Squat",muscle:"Glutes"},{name:"Cable Kickback",muscle:"Glutes"},
  {name:"Plank",muscle:"Core"},{name:"Crunch",muscle:"Core"},
  {name:"Russian Twist",muscle:"Core"},{name:"Hanging Leg Raise",muscle:"Core"},
  {name:"Ab Wheel",muscle:"Core"},
  {name:"Treadmill",muscle:"Cardio"},{name:"Cycling",muscle:"Cardio"},
  {name:"Elliptical",muscle:"Cardio"},{name:"Rowing Machine",muscle:"Cardio"},
];

const TEMPLATES = {
  push: ["Bench Press","Overhead Press","Incline Bench Press","Lateral Raise","Tricep Pushdown"],
  pull: ["Deadlift","Barbell Row","Lat Pulldown","Barbell Curl","Face Pull"],
  legs: ["Squat","Leg Press","Romanian Deadlift","Leg Curl","Calf Raise"],
  upper: ["Bench Press","Barbell Row","Overhead Press","Barbell Curl","Tricep Pushdown"],
  full:  ["Squat","Bench Press","Barbell Row","Overhead Press","Barbell Curl"],
};

const MUSCLES = [...new Set(EXERCISES.map(e => e.muscle))];

let db = {
  profile: { height: null, weight: null, age: null, gender: '', goal: 'build' },
  workouts: [],   // [{id,name,date,exercises:[{name,muscle,sets:[{reps,weight,done}]}]}]
  weightLog: [],  // [{date,weight}]
};

let activeWorkout = null;
let timerInterval = null;
let timerSeconds = 0;
let muscleFilter = null;

// ── STORAGE ──────────────────────────────────────────
function save() { try { localStorage.setItem('gymtrack_v2', JSON.stringify(db)); } catch(e) {} }
function load() {
  try {
    const raw = localStorage.getItem('gymtrack_v2');
    if (raw) db = JSON.parse(raw);
  } catch(e) {}
}

// ── INIT ──────────────────────────────────────────────
load();
document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-CA', {weekday:'short',month:'short',day:'numeric'});
renderProfile();
renderWorkoutPage();
renderHistory();
buildExercisePicker();

// ── NAV ───────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'profile') renderProfile();
}

// ── MODAL ─────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden'); });
});

// ── TOAST ─────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── PROFILE ───────────────────────────────────────────
function saveProfile() {
  const h = parseFloat(document.getElementById('inp-height').value);
  const w = parseFloat(document.getElementById('inp-weight').value);
  const a = parseInt(document.getElementById('inp-age').value);
  db.profile.height = h || db.profile.height;
  db.profile.weight = w || db.profile.weight;
  db.profile.age = a || db.profile.age;
  db.profile.gender = document.getElementById('inp-gender').value || db.profile.gender;
  db.profile.goal = document.getElementById('inp-goal').value;
  if (w) { db.weightLog.unshift({date: new Date().toISOString().split('T')[0], weight: w}); }
  save();
  renderProfile();
  toast('Profile saved!');
}

function renderProfile() {
  const p = db.profile;
  document.getElementById('disp-height').textContent = p.height ? p.height : '--';
  document.getElementById('disp-weight').textContent = p.weight ? p.weight : '--';
  
  if (p.height && p.weight) {
    const bmi = p.weight / ((p.height/100)**2);
    const bmiRound = bmi.toFixed(1);
    document.getElementById('disp-bmi').textContent = bmiRound;
    let cat='', cls='';
    if (bmi < 18.5) { cat='Underweight'; cls='bmi-under'; }
    else if (bmi < 25) { cat='Normal'; cls='bmi-normal'; }
    else if (bmi < 30) { cat='Overweight'; cls='bmi-over'; }
    else { cat='Obese'; cls='bmi-obese'; }
    const badge = document.getElementById('bmi-badge');
    badge.textContent = cat;
    badge.className = 'bmi-badge ' + cls;
  }
  
  const totalSets = db.workouts.reduce((acc, w) => acc + w.exercises.reduce((a,e) => a + e.sets.filter(s=>s.done).length, 0), 0);
  document.getElementById('disp-workouts').textContent = db.workouts.length;
  document.getElementById('disp-exercises').textContent = totalSets;
  
  // Fill form
  if (p.height) document.getElementById('inp-height').value = p.height;
  if (p.weight) document.getElementById('inp-weight').value = p.weight;
  if (p.age) document.getElementById('inp-age').value = p.age;
  if (p.gender) document.getElementById('inp-gender').value = p.gender;
  document.getElementById('inp-goal').value = p.goal;
  
  renderWeightHistory();
}

function logWeight() {
  const w = parseFloat(document.getElementById('inp-weight-log').value);
  if (!w) return;
  db.weightLog.unshift({date: new Date().toISOString().split('T')[0], weight: w});
  db.profile.weight = w;
  document.getElementById('disp-weight').textContent = w;
  document.getElementById('inp-weight-log').value = '';
  save();
  renderWeightHistory();
  renderProfile();
  toast('Weight logged!');
}

function renderWeightHistory() {
  const cont = document.getElementById('weight-history');
  if (!db.weightLog.length) { cont.innerHTML = '<p style="color:var(--muted);font-size:13px">No weight entries yet.</p>'; return; }
  cont.innerHTML = db.weightLog.slice(0,8).map((entry, i) => {
    const prev = db.weightLog[i+1];
    let delta = '';
    if (prev) {
      const diff = (entry.weight - prev.weight).toFixed(1);
      const cls = diff < 0 ? 'delta-down' : 'delta-up';
      const sign = diff > 0 ? '+' : '';
      delta = `<span class="${cls}">${sign}${diff} kg</span>`;
    }
    return `<div class="weight-entry">
      <div>
        <div class="we-date">${entry.date}</div>
        ${delta}
      </div>
      <div class="we-val">${entry.weight} <span style="font-size:14px;color:var(--muted)">kg</span></div>
    </div>`;
  }).join('');
}

// ── NEW WORKOUT ────────────────────────────────────────
function openNewWorkout() {
  document.getElementById('wk-name').value = '';
  document.getElementById('wk-template').value = '';
  openModal('modal-new-workout');
}

function applyTemplate() {
  const t = document.getElementById('wk-template').value;
  if (t && !document.getElementById('wk-name').value) {
    const names = {push:'Push Day',pull:'Pull Day',legs:'Leg Day',upper:'Upper Body',full:'Full Body'};
    document.getElementById('wk-name').value = names[t] || '';
  }
}

function startWorkout() {
  const name = document.getElementById('wk-name').value.trim() || 'Workout';
  const template = document.getElementById('wk-template').value;
  const exercises = [];
  if (template && TEMPLATES[template]) {
    TEMPLATES[template].forEach(exName => {
      const ex = EXERCISES.find(e => e.name === exName);
      exercises.push({name: exName, muscle: ex ? ex.muscle : 'Other', sets:[{reps:'',weight:'',done:false},{reps:'',weight:'',done:false},{reps:'',weight:'',done:false}]});
    });
  }
  activeWorkout = {
    id: Date.now(),
    name,
    date: new Date().toISOString().split('T')[0],
    exercises,
    started: new Date().toISOString(),
  };
  closeModal('modal-new-workout');
  renderWorkoutPage();
}

// ── WORKOUT PAGE ───────────────────────────────────────
function renderWorkoutPage() {
  const cont = document.getElementById('workout-content');
  if (!activeWorkout) {
    const today = db.workouts.filter(w => w.date === new Date().toISOString().split('T')[0]);
    if (today.length) {
      cont.innerHTML = `
        <div class="workout-meta">
          <div>
            <div class="wm-name">Today's workouts</div>
            <div class="wm-sub">${today.length} logged today</div>
          </div>
        </div>
        ${today.map(w => `
          <div class="exercise-card">
            <div class="ex-header">
              <div>
                <div class="ex-name">${w.name}</div>
                <div class="ex-muscle">${w.exercises.length} exercises · ${w.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0)} sets done</div>
              </div>
            </div>
          </div>`).join('')}
        <button class="btn btn-secondary" onclick="openNewWorkout()" style="margin-top:8px">Start Another</button>`;
      return;
    }
    cont.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>
        <p>No workout started today.<br>Tap <strong>+ New</strong> to begin.</p>
      </div>`;
    return;
  }

  const totalDone = activeWorkout.exercises.reduce((a,e) => a + e.sets.filter(s=>s.done).length, 0);
  const totalVol = activeWorkout.exercises.reduce((a,e) => a + e.sets.filter(s=>s.done).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0), 0);

  cont.innerHTML = `
    <div class="workout-meta">
      <div>
        <div class="wm-name">${activeWorkout.name}</div>
        <div class="wm-sub">${totalDone} sets done · ${Math.round(totalVol)} kg total vol</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="finishWorkout()">Finish</button>
    </div>
    ${activeWorkout.exercises.map((ex, ei) => renderExerciseCard(ex, ei)).join('')}
    <button class="btn btn-secondary" onclick="openAddExercise()" style="margin-top:4px">+ Add Exercise</button>
    <button class="btn btn-danger" onclick="discardWorkout()" style="margin-top:8px">Discard Workout</button>
  `;
}

function renderExerciseCard(ex, ei) {
  const setsHTML = ex.sets.map((set, si) => `
    <tr class="set-row ${set.done ? 'completed' : ''}">
      <td>Set ${si+1}</td>
      <td><input class="set-input" type="number" min="0" step="0.5" placeholder="kg" value="${set.weight}" onchange="updateSet(${ei},${si},'weight',this.value)"></td>
      <td><input class="set-input" type="number" min="0" placeholder="reps" value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)"></td>
      <td>
        <button class="icon-btn" onclick="toggleSetDone(${ei},${si})" title="Done">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </td>
    </tr>`).join('');

  return `<div class="exercise-card">
    <div class="ex-header">
      <div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-muscle">${ex.muscle}</div>
      </div>
      <div class="ex-actions">
        <button class="icon-btn del" onclick="removeExercise(${ei})" title="Remove">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
    <table class="sets-table">
      <thead><tr><th>Set</th><th>KG</th><th>Reps</th><th></th></tr></thead>
      <tbody>${setsHTML}</tbody>
    </table>
    <div class="sets-footer">
      <button class="add-set-btn" onclick="addSet(${ei})">+ Add Set</button>
    </div>
  </div>`;
}

function updateSet(ei, si, field, val) {
  if (!activeWorkout) return;
  activeWorkout.exercises[ei].sets[si][field] = val;
}

function toggleSetDone(ei, si) {
  if (!activeWorkout) return;
  const set = activeWorkout.exercises[ei].sets[si];
  set.done = !set.done;
  if (set.done) startRestTimer();
  renderWorkoutPage();
}

function addSet(ei) {
  if (!activeWorkout) return;
  activeWorkout.exercises[ei].sets.push({reps:'',weight:'',done:false});
  renderWorkoutPage();
}

function removeExercise(ei) {
  if (!activeWorkout) return;
  activeWorkout.exercises.splice(ei, 1);
  renderWorkoutPage();
}

function finishWorkout() {
  if (!activeWorkout) return;
  // remove empty sets
  activeWorkout.exercises.forEach(ex => {
    ex.sets = ex.sets.filter(s => s.reps || s.weight || s.done);
  });
  activeWorkout.exercises = activeWorkout.exercises.filter(ex => ex.sets.length > 0);
  if (!activeWorkout.exercises.length) { toast('Add at least one set!'); return; }
  db.workouts.unshift(activeWorkout);
  activeWorkout = null;
  save();
  stopTimer();
  renderWorkoutPage();
  toast('Workout saved!');
}

function discardWorkout() {
  if (!confirm('Discard this workout?')) return;
  activeWorkout = null;
  stopTimer();
  renderWorkoutPage();
}

// ── ADD EXERCISE ──────────────────────────────────────
function buildExercisePicker() {
  const mf = document.getElementById('muscle-filters');
  mf.innerHTML = ['All',...MUSCLES].map(m =>
    `<span class="muscle-group-btn ${m==='All'?'sel':''}" onclick="filterMuscle('${m}',this)">${m}</span>`
  ).join('');
  renderExPickList(null);
}

function filterMuscle(muscle, btn) {
  document.querySelectorAll('.muscle-group-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  muscleFilter = muscle === 'All' ? null : muscle;
  renderExPickList(muscleFilter);
}

function renderExPickList(muscle) {
  const list = muscle ? EXERCISES.filter(e => e.muscle === muscle) : EXERCISES;
  document.getElementById('ex-pick-list').innerHTML = list.map(ex =>
    `<div class="ex-pick-item" onclick="pickExercise('${ex.name}','${ex.muscle}')">
      <div>
        <div class="ep-name">${ex.name}</div>
        <div class="ep-muscle">${ex.muscle}</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>`
  ).join('');
}

function openAddExercise() {
  openModal('modal-add-exercise');
  document.getElementById('custom-ex-name').value = '';
}

function pickExercise(name, muscle) {
  if (!activeWorkout) return;
  activeWorkout.exercises.push({name, muscle, sets:[{reps:'',weight:'',done:false},{reps:'',weight:'',done:false},{reps:'',weight:'',done:false}]});
  closeModal('modal-add-exercise');
  renderWorkoutPage();
  toast(`${name} added`);
}

function addCustomExercise() {
  const name = document.getElementById('custom-ex-name').value.trim();
  const muscle = document.getElementById('custom-ex-muscle').value;
  if (!name) { toast('Enter exercise name'); return; }
  pickExercise(name, muscle);
}

// ── HISTORY ────────────────────────────────────────────
function renderHistory() {
  const cont = document.getElementById('history-content');
  if (!db.workouts.length) {
    cont.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <p>No workouts logged yet.<br>Complete a workout to see it here.</p></div>`;
    return;
  }
  // Group by date
  const byDate = {};
  db.workouts.forEach(w => {
    if (!byDate[w.date]) byDate[w.date] = [];
    byDate[w.date].push(w);
  });
  cont.innerHTML = Object.entries(byDate).map(([date, workouts]) => `
    <div class="history-day">
      <div class="history-day-header">${formatDate(date)}</div>
      ${workouts.map(w => {
        const doneSets = w.exercises.reduce((a,e) => a + e.sets.filter(s=>s.done).length, 0);
        const vol = Math.round(w.exercises.reduce((a,e) => a + e.sets.filter(s=>s.done).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0), 0));
        return `<div class="history-item">
          <div>
            <div class="name">${w.name}</div>
            <div class="sub">${w.exercises.length} exercises · ${doneSets} sets</div>
          </div>
          <div style="text-align:right">
            <div class="vol">${vol}</div>
            <div class="vol-lbl">kg vol</div>
          </div>
        </div>
        ${w.exercises.map(ex => {
          const exDone = ex.sets.filter(s=>s.done);
          if (!exDone.length) return '';
          const best = exDone.reduce((best, s) => {
            const load = (parseFloat(s.weight)||0);
            return load > (parseFloat(best.weight)||0) ? s : best;
          }, exDone[0]);
          return `<div style="padding:0 4px 4px 12px;display:flex;justify-content:space-between;font-size:13px;color:var(--muted)">
            <span>${ex.name}</span>
            <span>${exDone.length}×${best.weight||'?'}kg</span>
          </div>`;
        }).join('')}`;
      }).join('')}
    </div>`).join('');
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
  if (dateStr === today) return 'Today';
  if (dateStr === yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-CA', {weekday:'long', month:'short', day:'numeric'});
}

// ── REST TIMER ─────────────────────────────────────────
function startRestTimer(seconds = 90) {
  stopTimer();
  timerSeconds = seconds;
  document.getElementById('timer-bar').classList.remove('hidden');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      stopTimer();
      toast('Rest complete! Next set.');
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function resetTimer() { startRestTimer(90); }
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-bar').classList.add('hidden');
}
</script>
</body>
</html>
